<!DOCTYPE html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Primary Meta Tags -->
		<title>The Chaos Arcade 🕹️ | Jogos Vintages Gratuitos</title>
		<meta name="title" content="The Chaos Arcade 🕹️ | Jogos Vintages Gratuitos" />

		<meta name="keywords" content="jogos online, arcade, vintage, sveltekit, enduro 3d, dama, campo minado, chaos arcade" />
		<meta name="author" content="Chaos Arcade Team" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://chaos-arcade.pages.dev/" />
		<meta property="og:site_name" content="The Chaos Arcade" />
		<meta property="og:title" content="The Chaos Arcade 🕹️ | Jogos Vintages" />
		<meta property="og:description" content="Onde o código vai para brincar (e às vezes explodir). Experimente o Enduro 3D agora!" />

		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:type" content="image/png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://chaos-arcade.pages.dev/" />
		<meta property="twitter:title" content="The Chaos Arcade 🕹️ | Jogos Vintages" />
		<meta property="twitter:description" content="Onde o código vai para brincar (e às vezes explodir). Experimente o Enduro 3D agora!" />
		<meta property="twitter:image" content="https://chaos-arcade.pages.dev/og-image.png" />

		<!-- Theme Color for Mobile -->
		<meta name="theme-color" content="#facc15" />

		<!-- PWA -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/favicon.svg" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
